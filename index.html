<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Food & Frequency (A1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- SPOTIFY PREMIUM DESIGN SYSTEM --- */
        :root {
            --bg: #121212;
            --surface: rgba(24, 24, 24, 0.8);
            --surface-hover: rgba(40, 40, 40, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #1DB954;
            --accent-glow: rgba(29, 185, 84, 0.3);
            --correct: #1DB954;
            --incorrect: #E91429;
            --text-main: #FFFFFF;
            --text-dim: #B3B3B3;
            --font: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(29, 185, 84, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            font-family: var(--font);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- UI COMPONENTS --- */
        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 800; letter-spacing: 2px; font-size: 14px; display: flex; align-items: center; gap: 10px; color: #fff;}
        .logo span { color: var(--accent); }

        .level-badge {
            background: var(--accent);
            color: #000;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 900;
            margin-left: 10px;
        }

        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: #282828; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-glow); }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { background: var(--surface-hover); color: #fff; transform: scale(1.1); border-color: #fff;}

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1; margin-top: 70px; margin-bottom: 90px; position: relative;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .step {
            position: absolute; width: 100%; max-width: 850px;
            opacity: 0; pointer-events: none; transform: scale(0.98);
            transition: all 0.4s ease-out; visibility: hidden;
            max-height: 80vh; overflow-y: auto; padding: 20px;
        }

        .step.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
            visibility: visible; position: relative;
        }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1 { font-size: 3.5rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -2px; line-height: 1.1;}
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; font-weight: 700; letter-spacing: -0.5px;}
        p { margin-bottom: 20px; color: var(--text-dim); font-size: 1.1rem; }

        .btn {
            padding: 16px 36px; border: none; border-radius: 500px; font-family: var(--font);
            font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
            background: #fff; color: #000;
        }
        .btn-accent { background: var(--accent); color: #000; }
        .btn:hover { transform: scale(1.04); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- PREMIUM SPEAKING HUB --- */
        .speaking-hub {
            margin-top: 35px; padding: 30px;
            background: rgba(29, 185, 84, 0.05); border-radius: 12px;
            border: 1px solid rgba(29, 185, 84, 0.2);
            position: relative; display: none;
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .speaking-hub::before {
            content: 'SPEAKING HUB';
            position: absolute; top: -12px; left: 24px;
            background: var(--accent); color: #000;
            font-size: 0.7rem; font-weight: 900;
            padding: 4px 14px; border-radius: 500px;
            letter-spacing: 1px;
        }
        .speaking-hub p { margin: 0; color: #fff; font-weight: 600; font-size: 1.2rem; line-height: 1.5; }

        /* --- SPEAKING STARTERS (A1 SUPPORT) --- */
        .speaking-starters-container {
            margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;
        }
        .speaking-starter {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #EBEBEB; padding: 8px 18px; border-radius: 500px; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .speaking-starter:hover, .speaking-starter.active {
            background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05);
        }

        /* --- GRAMMAR CAPSULE --- */
        .capsule {
            border: 1px solid var(--accent); padding: 25px; border-radius: 12px;
            background: rgba(29, 185, 84, 0.05); margin: 20px 0;
        }
        .capsule-title { color: var(--accent); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; display: block;}
        .capsule-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .capsule-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; text-align: center; }
        .capsule-item b { color: var(--accent); font-size: 1.2rem; }

        /* --- BOTTOM NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: #181818; border-top: 1px solid #282828;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 90;
        }

        /* --- MODULE STYLES --- */
        .slider-group { margin-bottom: 30px; }
        .slider-group label { display: block; margin-bottom: 12px; font-weight: 600; color: #fff;}
        input[type=range] { -webkit-appearance: none; width: 100%; background: #535353; height: 4px; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; cursor: pointer; transition: 0.2s;}
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: var(--surface); border-radius: 12px; transition: all 0.2s; border: 1px solid var(--border); }
        .choice-card:hover { border-color: var(--accent); background: var(--surface-hover); }
        
        .list-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .list-item { padding: 18px 24px; background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; border: 1px solid var(--border);}
        .list-item:hover { border-color: var(--accent); background: var(--surface-hover); }

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; text-decoration: underline; text-underline-offset: 4px;}
        .vocab-word:hover { color: #fff; }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 15px; background: var(--surface); border-radius: 8px; font-weight: 600; border: 1px solid var(--border);}
        .toggle-btn { background: #282828; border: none; color: var(--text-main); padding: 10px 24px; border-radius: 500px; cursor: pointer; font-weight: 700; transition: 0.2s;}
        .toggle-btn.correct { background: var(--correct); color: #000; }
        .toggle-btn.incorrect { background: var(--incorrect); color: #fff; }

        .drop-zone { min-height: 80px; border: 2px dashed #535353; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; padding: 15px; gap: 10px; flex-wrap: wrap; }
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.05); }
        .word-bank { display: flex; gap: 10px; flex-wrap: wrap; }
        .word-chip { padding: 12px 24px; background: var(--surface); border-radius: 500px; cursor: pointer; user-select: none; transition: all 0.2s; font-weight: 600; border: 1px solid var(--border);}
        .word-chip.used { opacity: 0; pointer-events: none; }

        .chat-container { display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 16px 20px; border-radius: 16px; max-width: 80%; font-size: 1.1rem; }
        .msg.friend { background: #282828; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 700;}

        .arena-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 220px; height: 300px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; border-radius: 16px; }
        .card-front { background: var(--surface); font-size: 3rem; color: #fff; border: 1px solid var(--border);}
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; }

        .error-word { display: inline-block; padding: 5px 10px; cursor: pointer; border-radius: 6px; transition: 0.2s; font-weight: 700;}
        .error-word:hover { background: rgba(255,255,255,0.1); }

        /* --- PANELS --- */
        .vocab-panel {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
            background: #121212; border-left: 1px solid #282828;
            z-index: 200; padding: 40px 30px; box-shadow: -10px 0 40px rgba(0,0,0,0.8);
            transition: right 0.4s cubic-bezier(0.3, 0, 0, 1);
            display: flex; flex-direction: column; gap: 24px;
        }
        .vocab-panel.open { right: 0; }
        .vocab-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: none; color: #B3B3B3; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .whiteboard-panel { position: fixed; bottom: 90px; right: 20px; width: 400px; height: 500px; background: #181818; border: 1px solid #282828; border-radius: 12px 12px 0 0; z-index: 101; transform: translateY(120%); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5);}
        .whiteboard-panel.open { transform: translateY(0); }
        .wb-header { padding: 18px 20px; border-bottom: 1px solid #282828; display: flex; justify-content: space-between; font-weight: 700; color: #fff;}
        .wb-content { flex: 1; padding: 20px; outline: none; color: var(--accent); font-family: monospace; font-size: 1.1rem; resize: none; border: none; background: transparent; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        .highlight-zone { padding: 25px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 20px; font-size: 1.2rem; border: 1px solid var(--border);}
        
        .vocab-speak-box {
            margin-top: auto; background: linear-gradient(135deg, #1DB954 0%, #116a30 100%);
            border-radius: 12px; padding: 25px; position: relative;
        }
        .vocab-speak-box::before {
            content: 'FOLLOW UP'; position: absolute; top: -10px; left: 20px;
            background: #121212; color: var(--accent); font-size: 0.7rem; font-weight: 800;
            padding: 4px 10px; border-radius: 500px; letter-spacing: 1px;
        }
        .vocab-speak-box p { color: #121212 !important; font-weight: 900; margin: 0; font-size: 1.15rem; line-height: 1.4; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">WOLF LABS <span>|</span> FOOD & FREQUENCY <div class="level-badge">LEVEL A1</div></div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Live Whiteboard">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container">
        <!-- STEPS INJECTED VIA JS -->
    </main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; color: #fff;" id="prevBtn" onclick="prevStep()" disabled>BACK</button>
        <div style="font-weight: 700; font-size: 0.9rem; color: var(--text-dim); letter-spacing: 2px;" id="step-counter">STEP 0 / 37</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT</button>
    </nav>

    <aside class="vocab-panel" id="vocabPanel">
        <button class="vocab-close" onclick="closeVocab()">✕</button>
        <p style="font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;">A1 Dictionary</p>
        <h2 id="vocab-title" style="font-size: 3rem; font-weight: 800; line-height: 1.1; color: #fff; text-transform: uppercase;">WORD</h2>
        <div style="background: #181818; padding: 25px; border-radius: 12px; border: 1px solid var(--border);">
            <span style="font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block;">Meaning</span>
            <p id="vocab-def" style="font-size: 1.1rem; color: #fff; font-weight: 600;">Definition here.</p>
            <span style="font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin: 20px 0 10px 0; display: block;">Example</span>
            <p id="vocab-ex" style="font-size: 1rem; color: var(--text-dim); font-style: italic;">"Example sentence here."</p>
        </div>
        <div class="vocab-speak-box">
            <p id="vocab-speak">Follow up question here.</p>
        </div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span>📝 Live Whiteboard</span><button class="icon-btn" style="width: 24px; height: 24px; border: none; color: #fff;" onclick="toggleWhiteboard()">✕</button></div>
        <textarea class="wb-content" placeholder="Teacher: Type vocabulary or live notes here..."></textarea>
    </aside>

    <script>
        const vocabData = {
            'how often': { def: 'Used to ask about frequency (how many times).', ex: 'How often do you eat pizza?', speak: 'How often do you study English?' },
            'seafood': { def: 'Animals from the sea that we eat (fish, crabs).', ex: 'I love eating seafood at the beach.', speak: 'Do you like seafood? What is your favorite?' },
            'baked beans': { def: 'White beans cooked in tomato sauce. A UK classic.', ex: 'British people love baked beans on toast.', speak: 'Do you eat beans in your country?' },
            'disgusting': { def: 'Very bad. Horrible taste or smell.', ex: 'I think that soup is disgusting!', speak: 'What food do you think is disgusting?' },
            'usually': { def: 'Most of the time. A normal habit.', ex: 'I usually eat rice for lunch.', speak: 'What do you usually have for breakfast?' },
            'sometimes': { def: 'Not always. Only on some days.', ex: 'I sometimes eat chocolate on Fridays.', speak: 'What do you sometimes do on the weekends?' },
            'never': { def: 'Zero times. Not ever.', ex: 'I never drink coffee. I hate it.', speak: 'What is a food you NEVER eat?' },
            'classic': { def: 'Something traditional and very popular.', ex: 'Pizza is a classic Italian food.', speak: 'What is a classic food in your city?' }
        };

        const stepsData = [
            // 0: GUIDE
            `<div class="glass-panel">
                <h2>👨‍🏫 Teacher Guide</h2>
                <div class="capsule">
                    <p><strong>Goal:</strong> Master Food Vocab & Adverbs of Frequency (A1).</p>
                    <p><strong>Rule:</strong> 80% Student Speaking. Use the Whiteboard to list food items.</p>
                    <p><strong>A1 Support:</strong> Speaking Starters are active to help students initiate sentences.</p>
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p0')">Initialize</button>
                <div class="speaking-hub" id="p0">
                    <p>Teacher, ask the student: "Are you hungry right now?"</p>
                    <div class="speaking-starters-container">
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">Yes, I am very hungry!</span>
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">No, I am full...</span>
                    </div>
                </div>
            </div>`,
            // 1: COVER
            `<div style="text-align: center;">
                <p style="color: var(--accent); font-weight: 800; letter-spacing: 3px;">A1 BEGINNER SERIES</p>
                <h1>Food & Frequency</h1>
                <p>What do you like to eat? And how many times do you eat it?</p>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p1')">Start Mission</button>
                <div class="speaking-hub" id="p1" style="text-align: left;">
                    <p>Read the title out loud. What is your favorite food in the world?</p>
                    <div class="speaking-starters-container">
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">My favorite food is...</span>
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">I really love...</span>
                    </div>
                </div>
            </div>`,
            // 2: PANTRY CHECK (NEW)
            `<div class="glass-panel">
                <h2>Pantry Check</h2>
                <p>Do you have these foods in your house right now?</p>
                <div class="toggle-row"><span>🍎 Apples</span>
                    <div style="display:flex; gap:10px;">
                        <button class="toggle-btn" onclick="this.style.background='var(--correct)'; this.style.color='#000'; this.nextElementSibling.style.background='#282828'; this.nextElementSibling.style.color='#fff'; unlockPrompt('p2')">Yes</button>
                        <button class="toggle-btn" onclick="this.style.background='var(--incorrect)'; this.style.color='#fff'; this.previousElementSibling.style.background='#282828'; this.previousElementSibling.style.color='#fff'; unlockPrompt('p2')">No</button>
                    </div>
                </div>
                <div class="toggle-row"><span>🍝 Pasta</span>
                    <div style="display:flex; gap:10px;">
                        <button class="toggle-btn" onclick="this.style.background='var(--correct)'; this.style.color='#000'; this.nextElementSibling.style.background='#282828'; this.nextElementSibling.style.color='#fff'; unlockPrompt('p2')">Yes</button>
                        <button class="toggle-btn" onclick="this.style.background='var(--incorrect)'; this.style.color='#fff'; this.previousElementSibling.style.background='#282828'; this.previousElementSibling.style.color='#fff'; unlockPrompt('p2')">No</button>
                    </div>
                </div>
                <div class="toggle-row"><span>🍫 Chocolate</span>
                    <div style="display:flex; gap:10px;">
                        <button class="toggle-btn" onclick="this.style.background='var(--correct)'; this.style.color='#000'; this.nextElementSibling.style.background='#282828'; this.nextElementSibling.style.color='#fff'; unlockPrompt('p2')">Yes</button>
                        <button class="toggle-btn" onclick="this.style.background='var(--incorrect)'; this.style.color='#fff'; this.previousElementSibling.style.background='#282828'; this.previousElementSibling.style.color='#fff'; unlockPrompt('p2')">No</button>
                    </div>
                </div>
                <div class="speaking-hub" id="p2">
                    <p>Tell me one more food that you have in your house right now.</p>
                    <div class="speaking-starters-container">
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">I also have...</span>
                    </div>
                </div>
            </div>`,
            // 3: DIET PROFILE SLIDER (NEW)
            `<div class="glass-panel">
                <h2>Diet Profile</h2>
                <p>How often do you eat FAST FOOD (burgers, pizza, fries)? Move the slider.</p>
                <div class="slider-group" style="margin-top: 40px;">
                    <input type="range" min="0" max="100" value="50" onchange="checkSliders('p3')">
                    <div style="display:flex; justify-content:space-between; color:var(--text-dim); margin-top: 10px; font-weight: 700;">
                        <span>Never (0%)</span><span>Always (100%)</span>
                    </div>
                </div>
                <div class="speaking-hub" id="p3">
                    <p>What is your favorite fast food restaurant?</p>
                    <div class="speaking-starters-container">
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">My favorite fast food is...</span>
                    </div>
                </div>
            </div>`,
            // 4: VOCAB DISCOVERY
            `<div class="glass-panel">
                <h2>Data Decryption</h2>
                <div class="highlight-zone">
                    Neil <span class="vocab-word" onclick="openVocab('usually', 'p4')">usually</span> eats fish because he loves <span class="vocab-word" onclick="openVocab('seafood', 'p4')">seafood</span>. 
                    Beth <span class="vocab-word" onclick="openVocab('never', 'p4')">never</span> eats <span class="vocab-word" onclick="openVocab('baked beans', 'p4')">baked beans</span> because she thinks they are <span class="vocab-word" onclick="openVocab('disgusting', 'p4')">disgusting</span>!
                </div>
                <div class="speaking-hub" id="p4">
                    <p>Use the word "never" in a sentence about food.</p>
                    <div class="speaking-starters-container">
                        <span class="speaking-starter" onclick="this.classList.toggle('active')">I never eat... because...</span>
                    </div>
                </div>
            </div>`,
            // 5: VOCAB QUIZ (NEW)
            `<div>

            stepsData.forEach((html, i) => {
                const sec = document.createElement('section');

                sec.innerHTML = html;
                mainContainer.appendChild(sec);

        function updateUI() {
            document.querySelectorAll('.step').forEach((s, i) => {
                s.classList.toggle('active', i === currentStep);
            });
            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === stepsData.length - 1 ? 'none' : 'block';
            document.getElementById('step-counter').innerText = `STEP ${currentStep} / ${stepsData.length - 1}`;
            document.querySelector('.progress-bar').style.width = `${(currentStep / (stepsData.length - 1)) * 100}%`;
            mainContainer.scrollTo(0, 0);

                btn.style.pointerEvents = 'none';
                
                if (att >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.borderColor = 'var(--correct)';
                    }
                    if (promptIdToUnlock) {
                        setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                    }
                }
            }
        }

        function checkTrueFalse(btn, isCorrect, id) {
            const parent = btn.parentElement;
            let att = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('button'));
            
            if (isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--correct)';
                unlockPrompt(id);
            } else {
                att++;
                parent.dataset.attempts = att;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'var(--incorrect)';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';
                
                if (att >= 1) {
                    options.forEach(b => {
                        b.style.pointerEvents = 'none';
                        if (b.getAttribute('onclick').includes('true')) {
                            b.style.backgroundColor = 'var(--correct)';
                            b.style.color = '#000';
                            b.style.borderColor = 'var(--correct)';
                        }
                    });
                    setTimeout(() => unlockPrompt(id), 500);
                }
            }
        }

        const memSequence = ['ALWAYS', 'USUALLY', 'SOMETIMES', 'NEVER'];
        let memIndex = 0;
        let memAttempts = 0;

        function startMemoryGame() {
            document.getElementById('mem-seq').style.display = 'none';
            document.getElementById('mem-start').style.display = 'none';
            document.getElementById('mem-test').style.display = 'block';
            memIndex = 0;
            memAttempts = 0;
        }

        function checkMem(btn, word, promptId) {
            if(word === memSequence[memIndex]) {
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.pointerEvents = 'none';
                memIndex++;
                memAttempts = 0;
                if(memIndex === memSequence.length) unlockPrompt(promptId);
            } else {
                memAttempts++;
                btn.style.backgroundColor = 'var(--incorrect)';
                setTimeout(()=> {
                    if(btn.style.backgroundColor !== 'var(--correct)') {
                        btn.style.backgroundColor = 'transparent';
                    }
                }, 500);

                if (memAttempts >= 3) {
                    const correctWord = memSequence[memIndex];
                    const parent = btn.parentElement;
                    const correctBtn = Array.from(parent.querySelectorAll('.btn')).find(b => b.innerText.trim() === correctWord);
                    
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.pointerEvents = 'none';
                    }
                    memIndex++;
                    memAttempts = 0;
                    if(memIndex === memSequence.length) {
                        setTimeout(() => unlockPrompt(promptId), 500);
                    }
                }
            }
        }

        let buildState = {};
        function moveWord(chip, dzId, target, id) {
            if(chip.classList.contains('used')) return;
            const dz = document.getElementById(dzId);
            const n = document.createElement('div');
            n.className = 'word-chip'; n.innerText = chip.innerText; n.style.background = 'var(--accent)'; n.style.color = '#000';
            dz.appendChild(n); chip.classList.add('used');
            if(!buildState[dzId]) buildState[dzId] = []; buildState[dzId].push(chip.innerText);
            
            if(buildState[dzId].length === target.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(target)) { 
                    dz.classList.add('success'); unlockPrompt(id); 
                } else { 
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    dz.style.animation = 'shake 0.4s'; dz.style.borderColor = 'var(--incorrect)';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = ''; dz.style.animation = ''; dz.classList.add('success');
                            target.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip'; finalChip.style.background = 'var(--accent)'; finalChip.style.color = '#000'; finalChip.innerText = w;
                                dz.appendChild(finalChip);
                            });
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(id), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => { 
                            dz.innerHTML = ''; dz.style.borderColor=''; dz.style.animation=''; buildState[dzId]=[]; 
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('used')); 
                        }, 1000);
                    }
                }
            }
        }

        function handleChat(btn, isCorrect, containerId, promptId) {
            const container = document.getElementById(containerId);
            let att = parseInt(container.dataset.attempts || '0');
            const options = Array.from(container.querySelectorAll('.chat-option'));
            const maxAtt = Math.min(3, options.length - 1);

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000';
                setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${btn.innerText}</div>`; unlockPrompt(promptId); }, 800);
            } else {
                att++; container.dataset.attempts = att;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (att >= maxAtt) {
                    const corr = options.find(b => b.getAttribute('onclick').includes('true'));
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (corr) {
                        corr.style.backgroundColor = 'var(--correct)'; corr.style.color = '#000';
                        setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${corr.innerText}</div>`; unlockPrompt(promptId); }, 1000);
                    }
                }
            }
        }

        function flipCard(card, promptId) {
            if(!card.classList.contains('flipped')) { card.classList.add('flipped'); unlockPrompt(promptId); }
        }

        let matchS = null;
        let matchesF = 0;
        function handleMatch(card, id) {
            if(card.style.opacity === '0') return;
            if(!matchS) { matchS = card; card.style.borderColor = 'var(--accent)'; }
            else {
                if(matchS.dataset.val === card.dataset.val && matchS !== card) { 
                    matchS.style.opacity = '0'; card.style.opacity = '0'; matchesF++;
                    if(matchesF === 2) { unlockPrompt(id); }
                } else { matchS.style.borderColor = 'var(--border)'; card.style.animation = 'shake 0.4s'; }
                matchS = null;
            }
        }

        const roles = [
            "A person who ONLY eats Pizza.",
            "A person who NEVER eats meat (Vegetarian).",
            "A picky child who hates vegetables."
        ];
        function generateRole(promptId) {
            document.getElementById('role-box').innerText = roles[Math.floor(Math.random() * roles.length)];
            unlockPrompt(promptId);
        }

        function checkSliders(promptId) {
            unlockPrompt(promptId);
        }

        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        
        function openVocab(word, promptId) {
            const data = vocabData[word];
            if(data) {
                document.getElementById('vocab-title').innerText = word;
                document.getElementById('vocab-def').innerText = data.def;
                document.getElementById('vocab-ex').innerText = `"${data.ex}"`;
                document.getElementById('vocab-speak').innerText = data.speak;
            }
            document.getElementById('vocabPanel').classList.add('open');
            unlockPrompt(promptId);
        }
        
        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        
        function toggleFullscreen() {
            try {
                if (!document.fullscreenEnabled) return;
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => {}); } 
                else if (document.exitFullscreen) { document.exitFullscreen(); }
            } catch (err) {}
        }

        window.onload = initializeSteps;
    </script>
</body>
</html>
